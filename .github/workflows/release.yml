name: Release

# Publishes to npm with provenance. Triggers ONLY when a GitHub Release is
# published — never on push, PR, or tag alone — so a release is a deliberate,
# reviewable action. Publishing is CI-only from here on: no local `npm publish`.
# See RELEASING.md.
on:
  release:
    types: [published]

permissions:
  contents: read
  # Required for npm provenance / OIDC Trusted Publishing: lets the job mint a
  # short-lived OIDC token instead of carrying a long-lived npm token.
  id-token: write

jobs:
  publish:
    name: publish to npm (provenance)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node 22
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (OIDC Trusted Publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Guard — refuse to republish an existing version
        # npm rejects a duplicate version anyway, but failing here gives a clear
        # message and avoids a half-run release. `npm view <pkg>@<ver> version`
        # prints the version if it exists and errors (empty) if it does not.
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "package.json version: $VERSION"
          EXISTING="$(npm view "instagui@${VERSION}" version 2>/dev/null || true)"
          if [ -n "$EXISTING" ]; then
            echo "::error::instagui@${VERSION} is already published on npm. Bump the version before releasing."
            exit 1
          fi
          echo "instagui@${VERSION} is not on the registry — ok to publish."

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish with provenance
        # No NODE_AUTH_TOKEN: authentication is via OIDC Trusted Publishing,
        # configured once on npmjs.com (see PR description / RELEASING.md).
        # --provenance attaches a signed build-provenance attestation.
        run: npm publish --provenance --access public
