name: CI

# Runs on every push to main and on all pull requests. The suite is hermetic
# (no real network, DB, time, or credentials — see CLAUDE.md "Testing rules"),
# so CI needs no secrets. Environmental skips (live-key extraction tests, the
# POSIX-only injection test on Windows) self-skip via t.skip and count as
# skips, not failures, so the run stays green on every OS.
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo. Publishing/provenance is a
# separate release workflow.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other OSes when one fails — we want to see every
      # matrix cell's result, including Windows-specific path failures.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Package contents check
        run: npm pack --dry-run

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
